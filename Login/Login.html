<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMB – Login</title>
  <link rel="stylesheet" href="Login.css">
</head>

<body>


  
<header>
  <div class="emb-top">
    Republic of the Philippines | Department of Environment and Natural Resources
  </div>

  <div class="emb-main">
    <div class="emb-brand">
      <img src="../Image/logo.png" class="emb-logo" alt="EMB Logo">
      <div class="emb-text">
        <div class="t1">Republic of the Philippines</div>
        <div class="t1">Department of Environment and Natural Resources</div>
        <div class="t2">ENVIRONMENTAL MANAGEMENT BUREAU</div>
        <div class="t3">Western Visayas</div>
      </div>
    </div>

    <nav class="emb-nav">
      <a href="../Login/Login.html" class="active">Login</a>
      <a href="../Register/Register.html">Register</a>
    </nav>
  </div>
</header>


<div class="container">
  <div class="login-card">

    <img src="../Image/logo.png" class="card-logo" alt="Logo">
    <h2>Login Credentials</h2>

    <div id="statusMsg" class="status-msg"></div>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username">

    <label>Password</label>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Enter your password">
      <span id="togglePassword" class="eye">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" width="22" height="22"
             fill="none" stroke="currentColor" stroke-width="2"></svg>
      </span>
    </div>

    <button id="loginBtn" type="button">Login</button>

    <p class="register-link">
      No account yet? <a href="../Register/Register.html">Register here</a>
    </p>

  </div>
</div>

<script type="module" src="Login.js"></script>
</body>
</html>
